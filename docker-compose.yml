services:
  postgres:
    image: postgres:16
    container_name: medreability-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medreability}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medreability"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: medreability-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: medreability-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET_NAME:-medreability-media} &&
      mc anonymous set download local/${S3_BUCKET_NAME:-medreability-media}
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: MedReability.Api/Dockerfile
      network: host
    container_name: medreability-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-medreability};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Issuer: ${JWT_ISSUER:-MedReability.Api}
      Jwt__Audience: ${JWT_AUDIENCE:-MedReability.Client}
      Jwt__Key: ${JWT_KEY:-THIS_IS_A_DEVELOPMENT_ONLY_KEY_CHANGE_ME_123456}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      S3Storage__ServiceUrl: http://minio:9000
      S3Storage__PublicBaseUrl: ${S3_PUBLIC_BASE_URL:-http://localhost:9000}
      S3Storage__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      S3Storage__SecretKey: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3Storage__BucketName: ${S3_BUCKET_NAME:-medreability-media}
      S3Storage__ForcePathStyle: true

volumes:
  postgres_data:
  minio_data:
